brainstorm_task:
  description: >
    This is a fun creative exercise. Brainstorm 5 gift ideas that 
    a person who identifies as '{mbti}' would enjoy. 
    For each gift: write the name, a price range, and 1 sentence 
    explaining why it would make them smile.
  expected_output: >
    A numbered list of 5 gift ideas with name, price, and reason.
  agent: gift_lister

critique_task:
  description: >
    Look at the gift list above. Pick 2 gifts that feel too generic 
    or impersonal for someone who is '{mbti}'. 
    For each one, write 1 sentence explaining why it should be replaced 
    with something more personal.
  expected_output: >
    2 gifts from the list that should be replaced, with a reason for each.
  agent: gift_picker

refinement_task:
  description: >
    Replace the 2 weak gifts with 2 better, more personal alternatives 
    for a '{mbti}' person. Then output the final complete list of 5 gifts.
  expected_output: >
    The final list of 5 gift recommendations with name and short description.
  agent: gift_lister
